<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#10111a"/>
      <stop offset="100%" stop-color="#040408"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Subtle gold glow behind the letter -->
  <ellipse cx="16" cy="16" rx="11" ry="11" fill="url(#glow)"/>

  <!-- Greek epsilon ε — drawn as paths so it renders identically everywhere -->
  <!-- Outer arc (top) -->
  <path d="M22 11.5 C20 8.5 12 7.5 9 12 C7 15 8 20 11 22 C14 24.5 20.5 24 22.5 21"
        fill="none" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Middle bar -->
  <line x1="9.5" y1="16" x2="19" y2="16"
        stroke="#C9A84C" stroke-width="2.0" stroke-linecap="round"/>
</svg>
